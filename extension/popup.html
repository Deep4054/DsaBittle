<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSA Engine</title>
  <link rel="stylesheet" href="popup-glass.css" />
</head>
<body>

  <div class="popup" id="popup-shell">

    <!-- HEADER -->
    <header class="header">
      <div class="header-brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </div>
        <div>
          <div class="brand-name">DSA Engine</div>
          <div class="brand-sub">AI Coaching · LeetCode</div>
        </div>
      </div>
      <div class="header-right">
        <div class="level-badge" id="popup-level">Beginner</div>
      </div>
    </header>

    <!-- TICKER -->
    <div class="ticker-bar">
      <span class="live-dot"></span>
      <span id="popup-subtitle">Loading your progress...</span>
    </div>

    <!-- BODY -->
    <div class="body" id="gp-body">

      <!-- Loading -->
      <div id="popup-loading" class="loading-state">
        <div class="spinner"></div>
        <span>Loading stats...</span>
      </div>

      <!-- Content -->
      <div id="popup-content" style="display:none">

        <!-- Hero stat — problems solved -->
        <div class="hero-stat">
          <div class="hero-stat-label">Total Solved</div>
          <div class="hero-stat-num" id="stat-total">0</div>
          <div class="hero-stat-sub">problems completed</div>
        </div>

        <!-- Small stats row -->
        <div class="stats-row">
          <div class="stat-item">
            <div class="stat-item-label">Streak</div>
            <div class="stat-item-num" id="stat-streak">0</div>
            <div class="stat-item-sub">day streak</div>
          </div>
          <div class="stat-item">
            <div class="stat-item-label">Today</div>
            <div class="stat-item-num" id="stat-today">0</div>
            <div class="stat-item-sub">solved today</div>
          </div>
        </div>

        <!-- XP Progress -->
        <div class="popup-section">
          <div class="popup-section-label">Level Progress</div>
          <div class="xp-level-tags">
            <span class="xp-tag" id="xp-bar-current-level">Beginner</span>
            <span class="xp-arrow">→</span>
            <span class="xp-tag" id="xp-bar-next-level">Apprentice</span>
          </div>
          <div class="xp-track">
            <div class="xp-fill" id="xp-bar-fill" style="width:0%"></div>
          </div>
          <div class="xp-meta">
            <span id="stat-xp">0 XP</span>
            <span id="xp-pct">0%</span>
          </div>
        </div>

        <!-- Difficulty -->
        <div class="popup-section">
          <div class="popup-section-label">Difficulty Split</div>
          <div class="diff-list">
            <div class="diff-item diff-easy">
              <span class="diff-name">Easy</span>
              <div class="diff-track"><div class="diff-fill" id="bar-easy" style="width:0%"></div></div>
              <span class="diff-count" id="count-easy">0</span>
            </div>
            <div class="diff-item diff-med">
              <span class="diff-name">Medium</span>
              <div class="diff-track"><div class="diff-fill" id="bar-medium" style="width:0%"></div></div>
              <span class="diff-count" id="count-medium">0</span>
            </div>
            <div class="diff-item diff-hard">
              <span class="diff-name">Hard</span>
              <div class="diff-track"><div class="diff-fill" id="bar-hard" style="width:0%"></div></div>
              <span class="diff-count" id="count-hard">0</span>
            </div>
          </div>
        </div>

        <!-- Recent activity -->
        <div class="popup-section">
          <div class="popup-section-label">Recent Activity</div>
          <div class="history-wrap" id="popup-history-list"></div>
        </div>

      </div><!-- /popup-content -->
    </div><!-- /body -->

    <!-- FOOTER -->
    <footer class="footer">
      <button class="foot-btn ghost" id="btn-leetcode">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        LeetCode
      </button>
      <button class="foot-btn ghost" id="btn-dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </button>
      <button class="foot-btn primary" id="btn-report">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        AI Report
      </button>
    </footer>

  </div>

  <div id="popup-toast"></div>
  <script src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSA Dopamine Engine</title>
  <!-- ✅ Updated: DM Sans + DM Mono to match popup-glass.css -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup-glass.css" />
</head>
<body class="glass-popup-body">

  <!-- Ambient orbs -->
  <div class="amb-orb amb-orb-1"></div>
  <div class="amb-orb amb-orb-2"></div>
  <div class="amb-orb amb-orb-3"></div>

  <!-- POPUP SHELL — id must match popup.js -->
  <div class="popup-shell" id="popup-shell">

    <!-- HEADER -->
    <header class="ph">
      <div class="ph-left">
        <div class="ph-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/>
            <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/>
          </svg>
        </div>
        <div>
          <div class="ph-name">DSA Engine</div>
          <div class="ph-sub">AI-Powered Coaching</div>
        </div>
      </div>
      <div class="ph-right">
        <div class="ph-live">
          <span class="live-dot"></span>
          <span id="popup-level">Beginner</span>
        </div>
        <button class="ph-min-btn" id="gp-minimize" title="Minimize">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- SUBTITLE BAR -->
    <div class="ps-bar" id="gp-subtitle-bar">
      <span class="ps-text" id="popup-subtitle">Loading your progress...</span>
    </div>

    <!-- COLLAPSIBLE BODY -->
    <div class="pb" id="gp-body">

      <!-- Loading state -->
      <div id="popup-loading" class="pb-loading">
        <div class="pb-spinner"></div>
        <span>Loading stats…</span>
      </div>

      <!-- Main content -->
      <div id="popup-content" style="display:none">

        <!-- HERO STATS -->
        <div class="hero-stats">
          <div class="hs-item" data-col="amber">
            <div class="hs-num" id="stat-total">0</div>
            <div class="hs-lbl">Solved</div>
          </div>
          <div class="hs-div"></div>
          <div class="hs-item" data-col="orange">
            <div class="hs-num" id="stat-streak">0</div>
            <div class="hs-lbl">Streak 🔥</div>
          </div>
          <div class="hs-div"></div>
          <div class="hs-item" data-col="purple">
            <div class="hs-num" id="stat-xp">0</div>
            <div class="hs-lbl">XP</div>
          </div>
          <div class="hs-div"></div>
          <div class="hs-item" data-col="blue">
            <div class="hs-num" id="stat-today">0</div>
            <div class="hs-lbl">Today</div>
          </div>
        </div>

        <!-- XP PROGRESS -->
        <div class="card-glass">
          <div class="cg-head">
            <span class="cg-title">Level Progress</span>
            <span class="cg-badge" id="xp-bar-next-level">Apprentice</span>
          </div>
          <div class="xp-track">
            <div class="xp-fill" id="xp-bar-fill" style="width:0%"></div>
          </div>
          <div class="xp-labels">
            <span id="xp-bar-current-level">Beginner</span>
            <span id="xp-pct">0%</span>
          </div>
        </div>

        <!-- DIFFICULTY BREAKDOWN -->
        <div class="card-glass">
          <div class="cg-head">
            <span class="cg-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
              Difficulty Split
            </span>
          </div>
          <div class="diff-rows">
            <div class="diff-row">
              <span class="diff-tag easy">Easy</span>
              <div class="diff-track"><div class="diff-bar easy" id="bar-easy" style="width:0%"></div></div>
              <span class="diff-num" id="count-easy">0</span>
            </div>
            <div class="diff-row">
              <span class="diff-tag mid">Med</span>
              <div class="diff-track"><div class="diff-bar mid" id="bar-medium" style="width:0%"></div></div>
              <span class="diff-num" id="count-medium">0</span>
            </div>
            <div class="diff-row">
              <span class="diff-tag hard">Hard</span>
              <div class="diff-track"><div class="diff-bar hard" id="bar-hard" style="width:0%"></div></div>
              <span class="diff-num" id="count-hard">0</span>
            </div>
          </div>
        </div>

        <!-- RECENT PROBLEMS -->
        <div class="card-glass card-last">
          <div class="cg-head">
            <span class="cg-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              Recent Problems
            </span>
          </div>
          <div class="history-list" id="popup-history-list"></div>
        </div>

      </div><!-- /popup-content -->
    </div><!-- /pb -->

    <!-- FOOTER -->
    <footer class="pf">
      <button class="pf-btn pf-ghost" id="btn-leetcode">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        LeetCode
      </button>
      <button class="pf-btn pf-ghost" id="btn-dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </button>
      <button class="pf-btn pf-accent" id="btn-report">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/></svg>
        AI Report
      </button>
    </footer>

  </div><!-- /popup-shell -->

  <div id="popup-toast" class="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
